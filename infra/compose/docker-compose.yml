version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: resume-platform-postgres-1
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
volumes:
  pgdata:
